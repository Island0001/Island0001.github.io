<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="会議室予約">
  <title>会議室予約アシスタント</title>
  <link rel="icon" type="image/png" sizes="512x512" href="/app-icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-precomposed.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#f4f7fb;color:#0f172a}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    section{max-width:420px;background:#fff;border:1px solid #dbe4ef;border-radius:18px;padding:22px;text-align:center;box-shadow:0 18px 48px rgba(15,23,42,.14)}
    img{width:92px;height:92px;border-radius:22px;box-shadow:0 14px 34px rgba(15,23,42,.18)}
    h1{font-size:22px;margin:14px 0 8px}
    p{line-height:1.7;color:#64748b;margin:0}
  </style>
</head>
<body>
  <main>
    <section>
      <img src="/apple-touch-icon.png" alt="">
      <h1>会議室予約アシスタント</h1>
      <p>アプリ追加URLから開いてください。</p>
    </section>
  </main>
</body>
</html>
